name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy publica no branch gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build & deploy (gh-pages)
        run: mkdocs gh-deploy --force --no-history
